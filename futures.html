<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Futures</title>
  <style>
    body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 50vh 50vh; height: 100vh; background: #111; }
    iframe { width: 100%; height: 100%; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <!-- WTI Crude Oil -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:USOIL&interval=15&hidesidetoolbar=1"></iframe>

  <!-- Brent Crude Oil -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:UKOIL&interval=15&hidesidetoolbar=1"></iframe>

  <!-- Gold -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:GOLD&interval=15&hidesidetoolbar=1"></iframe>

  <!-- Silver -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:SILVER&interval=15&hidesidetoolbar=1"></iframe>

  <script>
    document.querySelectorAll("iframe").forEach(iframe => {
      iframe.addEventListener("click", () => {
        if (iframe.requestFullscreen) iframe.requestFullscreen();
        else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
        else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
      });
    });
  </script>
</body>
</html>
