<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Volatilité</title>
  <style>
    body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 50vh 50vh; height: 100vh; background: #111; }
    iframe { width: 100%; height: 100%; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <!-- VIX -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=CBOE:VIX&interval=15&hidesidetoolbar=1"></iframe>

  <!-- VIX 3 Months -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=CBOE:VIX3M&interval=15&hidesidetoolbar=1"></iframe>

  <!-- VIX 6 Months -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=CBOE:VIX6M&interval=15&hidesidetoolbar=1"></iframe>

  <!-- VIX 9 Months -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=CBOE:VIX9M&interval=15&hidesidetoolbar=1"></iframe>

  <script>
    document.querySelectorAll("iframe").forEach(iframe => {
      iframe.addEventListener("click", () => {
        if (iframe.requestFullscreen) iframe.requestFullscreen();
        else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
        else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
      });
    });
  </script>
</body>
</html>
